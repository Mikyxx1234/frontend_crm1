<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="EduIT CRM">
  <title>EduIT CRM</title>
  <!--
    Versăo MASKABLE do ícone PWA.
    Android pode aplicar máscaras (círculo, squircle, teardrop) e
    cortar os cantos do ícone  entăo a "safe zone" é o círculo
    central de 80% (de 102 a 922). Aqui:
    - O fundo navy se estende borda-a-borda (sem rounded  a máscara
      do SO faz isso).
    - O "E" foi reduzido para 60% do canvas e centralizado, para
      caber em qualquer máscara sem ser cortado.
  -->
  <defs>
    <radialGradient id="cyanGlowMask" cx="80%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.32" />
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" fill="#0d1b3e" />
  <rect x="0" y="0" width="1024" height="1024" fill="url(#cyanGlowMask)" />

  <g fill="#ffffff" transform="translate(204 204) scale(0.6)">
    <rect x="320" y="280" width="128" height="464" rx="14" />
    <rect x="320" y="280" width="392" height="104" rx="14" />
    <rect x="320" y="460" width="316" height="104" rx="14" />
    <rect x="320" y="640" width="392" height="104" rx="14" />
  </g>
</svg>
