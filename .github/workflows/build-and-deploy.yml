name: Build & Deploy

# Estrategia pre-built: `next build` roda diretamente no runner GHA com
# actions/cache para node_modules (.next/cache). Depois, o Docker apenas
# empacota o output standalone (Dockerfile.prebuilt -- sem npm install,
# sem compilacao). Resultado esperado:
#
#   Antes (build inline no Docker): ~3-4 min por push
#   Depois (pre-built + cache quente): ~1-1.5 min por push
#
# Setup no GitHub (Settings -> Secrets and variables -> Actions):
#
#   Variables (Repository variables):
#     API_BASE_PROD          Ex: https://crm-backend.easypanel.host
#     API_BASE_DEV           Ex: https://crm-dev-backend.ca31ey.easypanel.host
#     NEXTAUTH_URL_PROD      Ex: https://crm.easypanel.host
#     NEXTAUTH_URL_DEV       Ex: https://crm-dev-frontend.ca31ey.easypanel.host
#
#   Secrets:
#     NEXTAUTH_SECRET_PROD           (mesmo valor do NEXTAUTH_SECRET em prod)
#     NEXTAUTH_SECRET_DEV            (idem para dev)
#     EASYPANEL_WEBHOOK_PROD         URL do webhook do servico frontend em prod
#     EASYPANEL_WEBHOOK_DEV          URL do webhook do servico frontend em dev

on:
  push:
    branches: [main, DEV_BRANCH]
  workflow_dispatch:

# Cancela runs anteriores da MESMA branch ainda em andamento quando um push
# novo chega. Evita fila/desperdicio quando voce empurra varios commits
# seguidos (o ultimo e o que importa pro deploy).
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mikyxx1234/frontend_crm1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        # Passar vars/secrets via `env:` (nao inline via ${{ }}) evita
        # que valores com newline/aspas colados no GitHub UI quebrem o
        # parser de $GITHUB_OUTPUT. Alem disso, trim manual com `tr -d '\n\r'`
        # remove qualquer whitespace acidental (Enter no fim do paste).
        env:
          BRANCH_REF: ${{ github.ref }}
          V_API_BASE_PROD: ${{ vars.API_BASE_PROD }}
          V_API_BASE_DEV: ${{ vars.API_BASE_DEV }}
          V_NEXTAUTH_URL_PROD: ${{ vars.NEXTAUTH_URL_PROD }}
          V_NEXTAUTH_URL_DEV: ${{ vars.NEXTAUTH_URL_DEV }}
          S_NEXTAUTH_SECRET_PROD: ${{ secrets.NEXTAUTH_SECRET_PROD }}
          S_NEXTAUTH_SECRET_DEV: ${{ secrets.NEXTAUTH_SECRET_DEV }}
          S_WEBHOOK_PROD: ${{ secrets.EASYPANEL_WEBHOOK_PROD }}
          S_WEBHOOK_DEV: ${{ secrets.EASYPANEL_WEBHOOK_DEV }}
        run: |
          if [ "$BRANCH_REF" = "refs/heads/main" ]; then
            TAG=latest
            API_BASE="$V_API_BASE_PROD"
            NEXTAUTH_URL="$V_NEXTAUTH_URL_PROD"
            NEXTAUTH_SECRET="$S_NEXTAUTH_SECRET_PROD"
            WEBHOOK="$S_WEBHOOK_PROD"
          else
            TAG=dev
            API_BASE="$V_API_BASE_DEV"
            NEXTAUTH_URL="$V_NEXTAUTH_URL_DEV"
            NEXTAUTH_SECRET="$S_NEXTAUTH_SECRET_DEV"
            WEBHOOK="$S_WEBHOOK_DEV"
          fi
          TAG=$(printf '%s' "$TAG" | tr -d '\r\n')
          API_BASE=$(printf '%s' "$API_BASE" | tr -d '\r\n')
          NEXTAUTH_URL=$(printf '%s' "$NEXTAUTH_URL" | tr -d '\r\n')
          NEXTAUTH_SECRET=$(printf '%s' "$NEXTAUTH_SECRET" | tr -d '\r\n')
          WEBHOOK=$(printf '%s' "$WEBHOOK" | tr -d '\r\n')
          {
            echo "TAG=$TAG"
            echo "API_BASE=$API_BASE"
            echo "NEXTAUTH_URL=$NEXTAUTH_URL"
            echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET"
            echo "WEBHOOK=$WEBHOOK"
          } >> "$GITHUB_OUTPUT"
          echo "::group::env resolved (values masked)"
          [ -n "$TAG" ]             && echo "TAG=<set>"             || echo "TAG=<EMPTY>"
          [ -n "$API_BASE" ]        && echo "API_BASE=<set>"        || echo "API_BASE=<EMPTY>"
          [ -n "$NEXTAUTH_URL" ]    && echo "NEXTAUTH_URL=<set>"    || echo "NEXTAUTH_URL=<EMPTY>"
          [ -n "$NEXTAUTH_SECRET" ] && echo "NEXTAUTH_SECRET=<set>" || echo "NEXTAUTH_SECRET=<EMPTY>"
          [ -n "$WEBHOOK" ]         && echo "WEBHOOK=<set>"         || echo "WEBHOOK=<EMPTY>"
          echo "::endgroup::"

      # ── Build Next.js fora do Docker ─────────────────────────────────────
      # actions/setup-node com cache: 'npm' cacheia node_modules baseado no
      # hash do package-lock.json. npm ci fica em ~5-10s quando cache quente.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Cacheia o node_modules INTEIRO (nao so o ~/.npm). Chave exata pelo
      # hash do package-lock.json: se as deps nao mudaram, restauramos
      # node_modules pronto e pulamos o `npm ci` (economiza ~40s/build).
      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      # Cache separado para .next/cache (webpack incremental). Chave inclui
      # hash de src/** para cache exato; restore-keys dao fallback progressivo:
      # 1) mesma branch + mesmo source (hit exato, mais rapido)
      # 2) mesma branch (webpack usa cache parcial)
      # 3) main (DEV_BRANCH herda cache da main quando proprio esta frio)
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ github.ref_name }}-${{ hashFiles('src/**', 'package-lock.json') }}
          restore-keys: |
            nextjs-${{ github.ref_name }}-
            nextjs-main-

      # So roda npm ci quando o cache de node_modules NAO bateu (deps
      # mudaram). Cache hit => pula direto pro build.
      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ steps.env.outputs.API_BASE }}
          NEXTAUTH_URL: ${{ steps.env.outputs.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ steps.env.outputs.NEXTAUTH_SECRET }}
          AUTH_SECRET: ${{ steps.env.outputs.NEXTAUTH_SECRET }}
        run: npm run build

      # ── Empacotar em imagem Docker (so COPY, ~10s) ───────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Cache minimo: a imagem pre-built nao tem layers de build pesadas,
          # entao mode=min e suficiente (so cacheia a camada base do SO).
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Trigger Easypanel redeploy
        if: steps.env.outputs.WEBHOOK != ''
        run: |
          echo "Chamando webhook do Easypanel..."
          curl -fsSL -X POST "${{ steps.env.outputs.WEBHOOK }}" \
            -H "User-Agent: github-actions/frontend_crm1" \
            || echo "WARN: webhook falhou (nao bloqueia o job)"
