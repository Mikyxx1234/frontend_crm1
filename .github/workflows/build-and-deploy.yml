name: Build & Deploy

# Buildamos a imagem no GitHub Actions (com cache persistente entre runs
# via `type=gha`), publicamos em ghcr.io e disparamos um webhook do
# Easypanel pra ele apenas fazer `docker pull` + restart. Deploy fim-a-fim
# cai de 5-10 min pra ~30-60s.
#
# Setup no GitHub (Settings -> Secrets and variables -> Actions):
#
#   Variables (Repository variables):
#     API_BASE_PROD          Ex: https://crm-backend.easypanel.host
#     API_BASE_DEV           Ex: https://crm-dev-backend.ca31ey.easypanel.host
#     NEXTAUTH_URL_PROD      Ex: https://crm.easypanel.host
#     NEXTAUTH_URL_DEV       Ex: https://crm-dev-frontend.ca31ey.easypanel.host
#
#   Secrets:
#     NEXTAUTH_SECRET_PROD           (mesmo valor do NEXTAUTH_SECRET em prod)
#     NEXTAUTH_SECRET_DEV            (idem para dev)
#     EASYPANEL_WEBHOOK_PROD         URL do webhook do servico frontend em prod
#     EASYPANEL_WEBHOOK_DEV          URL do webhook do servico frontend em dev
#
# Setup no Easypanel (por servico):
#   Source: Docker Image
#   Image:  ghcr.io/mikyxx1234/frontend_crm1:latest   (prod)
#           ghcr.io/mikyxx1234/frontend_crm1:dev      (dev)
#   Registry credentials: crie um GitHub PAT com escopo `read:packages` e
#     cadastre em Easypanel -> Registries. (Se o pacote estiver public,
#     nao precisa autenticar.)
#   Deploy webhook: copie do Easypanel (Settings do servico -> Deployments
#     -> Deploy Hook) e coloque em EASYPANEL_WEBHOOK_PROD/DEV.

on:
  push:
    branches: [main, DEV_BRANCH]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mikyxx1234/frontend_crm1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        # Passar vars/secrets via `env:` (nao inline via ${{ }}) evita
        # que valores com newline/aspas colados no GitHub UI quebrem o
        # parser de $GITHUB_OUTPUT. Alem disso, trim manual com `tr -d '\n\r'`
        # remove qualquer whitespace acidental (Enter no fim do paste).
        env:
          BRANCH_REF: ${{ github.ref }}
          V_API_BASE_PROD: ${{ vars.API_BASE_PROD }}
          V_API_BASE_DEV: ${{ vars.API_BASE_DEV }}
          V_NEXTAUTH_URL_PROD: ${{ vars.NEXTAUTH_URL_PROD }}
          V_NEXTAUTH_URL_DEV: ${{ vars.NEXTAUTH_URL_DEV }}
          S_NEXTAUTH_SECRET_PROD: ${{ secrets.NEXTAUTH_SECRET_PROD }}
          S_NEXTAUTH_SECRET_DEV: ${{ secrets.NEXTAUTH_SECRET_DEV }}
          S_WEBHOOK_PROD: ${{ secrets.EASYPANEL_WEBHOOK_PROD }}
          S_WEBHOOK_DEV: ${{ secrets.EASYPANEL_WEBHOOK_DEV }}
        run: |
          # Escolhe conjunto de vars conforme branch.
          if [ "$BRANCH_REF" = "refs/heads/main" ]; then
            TAG=latest
            API_BASE="$V_API_BASE_PROD"
            NEXTAUTH_URL="$V_NEXTAUTH_URL_PROD"
            NEXTAUTH_SECRET="$S_NEXTAUTH_SECRET_PROD"
            WEBHOOK="$S_WEBHOOK_PROD"
          else
            TAG=dev
            API_BASE="$V_API_BASE_DEV"
            NEXTAUTH_URL="$V_NEXTAUTH_URL_DEV"
            NEXTAUTH_SECRET="$S_NEXTAUTH_SECRET_DEV"
            WEBHOOK="$S_WEBHOOK_DEV"
          fi
          # Trim de \r e \n em todos (defesa contra copy/paste ruim).
          TAG=$(printf '%s' "$TAG" | tr -d '\r\n')
          API_BASE=$(printf '%s' "$API_BASE" | tr -d '\r\n')
          NEXTAUTH_URL=$(printf '%s' "$NEXTAUTH_URL" | tr -d '\r\n')
          NEXTAUTH_SECRET=$(printf '%s' "$NEXTAUTH_SECRET" | tr -d '\r\n')
          WEBHOOK=$(printf '%s' "$WEBHOOK" | tr -d '\r\n')
          # Emite outputs no formato key=value (agora garantidamente 1 linha).
          {
            echo "TAG=$TAG"
            echo "API_BASE=$API_BASE"
            echo "NEXTAUTH_URL=$NEXTAUTH_URL"
            echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET"
            echo "WEBHOOK=$WEBHOOK"
          } >> "$GITHUB_OUTPUT"
          # Debug: mostra se algum obrigatorio veio vazio (ajuda a
          # diagnosticar variables/secrets nao configurados).
          echo "::group::env resolved (values masked)"
          [ -n "$TAG" ]             && echo "TAG=<set>"             || echo "TAG=<EMPTY>"
          [ -n "$API_BASE" ]        && echo "API_BASE=<set>"        || echo "API_BASE=<EMPTY>"
          [ -n "$NEXTAUTH_URL" ]    && echo "NEXTAUTH_URL=<set>"    || echo "NEXTAUTH_URL=<EMPTY>"
          [ -n "$NEXTAUTH_SECRET" ] && echo "NEXTAUTH_SECRET=<set>" || echo "NEXTAUTH_SECRET=<EMPTY>"
          [ -n "$WEBHOOK" ]         && echo "WEBHOOK=<set>"         || echo "WEBHOOK=<EMPTY>"
          echo "::endgroup::"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Tags: tag do env (latest/dev) + SHA para rollback facil.
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # NEXT_PUBLIC_* precisa entrar no bundle no momento do build --
          # Next.js nao suporta injecao em runtime pra essas envs. Se
          # rodar a mesma imagem em prod+dev, teria que rebuildar.
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ steps.env.outputs.API_BASE }}
            NEXTAUTH_URL=${{ steps.env.outputs.NEXTAUTH_URL }}
            NEXTAUTH_SECRET=${{ steps.env.outputs.NEXTAUTH_SECRET }}
            AUTH_SECRET=${{ steps.env.outputs.NEXTAUTH_SECRET }}
          # Cache em GitHub Actions -- primeiro build ~7min, subsequentes
          # ~2min (so recompila o que mudou, deps ficam cachadas).
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Easypanel redeploy
        if: steps.env.outputs.WEBHOOK != ''
        run: |
          echo "Chamando webhook do Easypanel..."
          curl -fsSL -X POST "${{ steps.env.outputs.WEBHOOK }}" \
            -H "User-Agent: github-actions/frontend_crm1" \
            || echo "WARN: webhook falhou (nao bloqueia o job)"
