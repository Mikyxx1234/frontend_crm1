<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0d1b3e" />
    <title>EduIT CRM</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d1b3e;
        color: #e8eefc;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      main {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        opacity: 0.75;
        font-size: 0.9rem;
        max-width: 28rem;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>EduIT CRM</h1>
        <p>
          Casca nativa pronta. Em builds com <code>server.url</code> configurada,
          o WebView carrega o CRM remoto automaticamente.
        </p>
      </div>
    </main>
  </body>
</html>
