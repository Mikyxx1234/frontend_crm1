<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="EduIT CRM">
  <title>EduIT CRM</title>
  <!--
    Õcone PWA EduIT CRM.
    - Fundo: brand-navy #0d1b3e (mesmo da sidebar).
    - Cantos arredondados (rx=224 ~ 22%  padr„o iOS app icon).
    - Glow cyan sutil no canto inferior direito (sem agredir).
